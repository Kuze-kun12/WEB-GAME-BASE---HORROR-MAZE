<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Dialog</title>
    <link rel="stylesheet" href="src/win.css">
</head>
<body class="win-page">
    <div class="viewer">
        <div class="counter" id="counter">1 / 5</div>
        <div class="slide active"><img src="./final/win/endgame panels _)/Untitled58.png" alt="Win Dialog 1"></div>
        <div class="slide"><img src="./final/win/endgame panels _)/Untitled59.png" alt="Win Dialog 2"></div>
        <div class="slide"><img src="./final/win/endgame panels _)/Untitled60.png" alt="Win Dialog 3"></div>
        <div class="slide"><img src="./final/win/endgame panels _)/Untitled61.png" alt="Win Dialog 4"></div>
        <div class="slide"><img src="./final/win/endgame panels _)/Untitled62.png" alt="Win Dialog 5"></div>
        <div class="slide">
            <img src="./final/game assets (dialogues & avatars) 🙃/Trio.png" alt="Credits Trio">
            <div class="credits-caption">Credits</div>
        </div>
    </div>
    <div class="footer">
        <p>Press ENTER to continue through the win dialog.</p>
        <div class="hint">After the last image, this page will return to the main menu.</div>
    </div>

    <script src="functions/win.js" defer></script>
</body>
</html>
